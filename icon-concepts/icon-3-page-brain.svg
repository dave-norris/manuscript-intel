<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 3: Document page with a neural/brain circuit pattern -->
  <defs>
    <linearGradient id="pageBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F1F5F9"/>
    </linearGradient>
    <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Document page with folded corner -->
  <path d="M110 60 L362 60 L402 100 L402 452 L110 452 Z" fill="url(#pageBg)" stroke="#CBD5E0" stroke-width="2" filter="url(#shadow)"/>
  <path d="M362 60 L362 100 L402 100 Z" fill="#E2E8F0" stroke="#CBD5E0" stroke-width="2"/>

  <!-- Text lines (top portion) -->
  <rect x="145" y="110" width="180" height="7" rx="3.5" fill="#94A3B8"/>
  <rect x="145" y="130" width="150" height="7" rx="3.5" fill="#94A3B8"/>
  <rect x="145" y="150" width="170" height="7" rx="3.5" fill="#94A3B8"/>
  <rect x="145" y="170" width="130" height="7" rx="3.5" fill="#94A3B8"/>

  <!-- Neural network / brain circuit (lower portion of page) -->
  <!-- Nodes -->
  <circle cx="200" cy="260" r="10" fill="url(#circuitGrad)"/>
  <circle cx="300" cy="240" r="10" fill="url(#circuitGrad)"/>
  <circle cx="250" cy="310" r="12" fill="url(#circuitGrad)"/>
  <circle cx="340" cy="310" r="10" fill="url(#circuitGrad)"/>
  <circle cx="170" cy="340" r="8" fill="url(#circuitGrad)"/>
  <circle cx="290" cy="370" r="10" fill="url(#circuitGrad)"/>
  <circle cx="200" cy="400" r="9" fill="url(#circuitGrad)"/>
  <circle cx="350" cy="380" r="8" fill="url(#circuitGrad)"/>
  <circle cx="250" cy="420" r="10" fill="url(#circuitGrad)"/>
  <circle cx="160" cy="270" r="6" fill="#A78BFA"/>
  <circle cx="360" cy="270" r="6" fill="#A78BFA"/>

  <!-- Connections -->
  <line x1="200" y1="260" x2="300" y2="240" stroke="#7C3AED" stroke-width="2" opacity="0.6"/>
  <line x1="200" y1="260" x2="250" y2="310" stroke="#7C3AED" stroke-width="2" opacity="0.6"/>
  <line x1="300" y1="240" x2="340" y2="310" stroke="#7C3AED" stroke-width="2" opacity="0.6"/>
  <line x1="300" y1="240" x2="250" y2="310" stroke="#7C3AED" stroke-width="2" opacity="0.6"/>
  <line x1="250" y1="310" x2="290" y2="370" stroke="#7C3AED" stroke-width="2" opacity="0.6"/>
  <line x1="250" y1="310" x2="170" y2="340" stroke="#7C3AED" stroke-width="2" opacity="0.6"/>
  <line x1="340" y1="310" x2="350" y2="380" stroke="#7C3AED" stroke-width="2" opacity="0.6"/>
  <line x1="340" y1="310" x2="290" y2="370" stroke="#7C3AED" stroke-width="2" opacity="0.6"/>
  <line x1="170" y1="340" x2="200" y2="400" stroke="#7C3AED" stroke-width="2" opacity="0.6"/>
  <line x1="290" y1="370" x2="250" y2="420" stroke="#7C3AED" stroke-width="2" opacity="0.6"/>
  <line x1="200" y1="400" x2="250" y2="420" stroke="#7C3AED" stroke-width="2" opacity="0.6"/>
  <line x1="350" y1="380" x2="290" y2="370" stroke="#7C3AED" stroke-width="2" opacity="0.6"/>
  <line x1="160" y1="270" x2="200" y2="260" stroke="#A78BFA" stroke-width="1.5" opacity="0.4"/>
  <line x1="360" y1="270" x2="300" y2="240" stroke="#A78BFA" stroke-width="1.5" opacity="0.4"/>

  <!-- Pulse/glow on central node -->
  <circle cx="250" cy="310" r="18" fill="none" stroke="#7C3AED" stroke-width="1.5" opacity="0.3"/>
  <circle cx="250" cy="310" r="24" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.15"/>
</svg>
