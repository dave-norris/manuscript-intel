<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 4: Stylized "M" lettermark with integrated data/bar chart motif -->
  <defs>
    <linearGradient id="mGrad1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1E40AF"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <linearGradient id="mGrad2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <linearGradient id="mGrad3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#C4B5FD"/>
    </linearGradient>
    <linearGradient id="roundBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="40" y="40" width="432" height="432" rx="90" fill="url(#roundBg)"/>

  <!-- "M" constructed as bar chart columns of different heights -->
  <!-- Left leg of M -->
  <rect x="110" y="140" width="45" height="260" rx="8" fill="url(#mGrad1)"/>

  <!-- Left-center rising bar (part of M's left peak) -->
  <rect x="175" y="190" width="45" height="210" rx="8" fill="url(#mGrad2)"/>

  <!-- Center valley of M (shorter bar) -->
  <rect x="240" y="250" width="45" height="150" rx="8" fill="url(#mGrad3)"/>

  <!-- Right-center rising bar (part of M's right peak) -->
  <rect x="305" y="170" width="45" height="230" rx="8" fill="url(#mGrad2)"/>

  <!-- Right leg of M -->
  <rect x="370" y="120" width="45" height="280" rx="8" fill="url(#mGrad1)"/>

  <!-- Connecting line across tops to form M shape -->
  <polyline points="132,140 197,190 262,250 327,170 392,120"
            fill="none" stroke="#F59E0B" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Data dots at peaks -->
  <circle cx="132" cy="140" r="6" fill="#FBBF24"/>
  <circle cx="197" cy="190" r="6" fill="#FBBF24"/>
  <circle cx="262" cy="250" r="6" fill="#FBBF24"/>
  <circle cx="327" cy="170" r="6" fill="#FBBF24"/>
  <circle cx="392" cy="120" r="6" fill="#FBBF24"/>

  <!-- Subtle baseline -->
  <line x1="100" y1="410" x2="420" y2="410" stroke="#475569" stroke-width="2" opacity="0.5"/>
</svg>
