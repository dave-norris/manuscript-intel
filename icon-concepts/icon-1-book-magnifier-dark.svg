<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Dark version: Open book with magnifying glass revealing data/insights -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#4338CA"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="100" fill="url(#bgGrad)"/>

  <!-- Book base (dark pages) -->
  <path d="M90 130 C90 110, 110 90, 130 90 L256 90 L256 390 L130 390 C110 390, 90 370, 90 350 Z" fill="url(#pageGrad)" stroke="#334155" stroke-width="3"/>
  <path d="M256 90 L382 90 C402 90, 422 110, 422 130 L422 350 C422 370, 402 390, 382 390 L256 390 Z" fill="url(#pageGrad)" stroke="#334155" stroke-width="3"/>

  <!-- Book spine -->
  <rect x="248" y="86" width="16" height="308" rx="4" fill="url(#bookGrad)"/>

  <!-- Text lines on left page (dimmed for dark theme) -->
  <rect x="120" y="145" width="110" height="6" rx="3" fill="#475569"/>
  <rect x="120" y="163" width="90" height="6" rx="3" fill="#475569"/>
  <rect x="120" y="181" width="105" height="6" rx="3" fill="#475569"/>
  <rect x="120" y="199" width="80" height="6" rx="3" fill="#475569"/>
  <rect x="120" y="217" width="100" height="6" rx="3" fill="#475569"/>
  <rect x="120" y="250" width="110" height="6" rx="3" fill="#475569"/>
  <rect x="120" y="268" width="85" height="6" rx="3" fill="#475569"/>
  <rect x="120" y="286" width="98" height="6" rx="3" fill="#475569"/>

  <!-- Magnifying glass -->
  <circle cx="355" cy="310" r="68" fill="rgba(99,102,241,0.08)" stroke="url(#lensGrad)" stroke-width="12"/>
  <line x1="403" y1="358" x2="443" y2="400" stroke="url(#lensGrad)" stroke-width="14" stroke-linecap="round"/>

  <!-- Data visualization inside lens (brighter bars on dark) -->
  <rect x="320" y="322" width="13" height="38" rx="3" fill="#818CF8"/>
  <rect x="338" y="300" width="13" height="60" rx="3" fill="#A78BFA"/>
  <rect x="356" y="312" width="13" height="48" rx="3" fill="#C4B5FD"/>
  <rect x="374" y="290" width="13" height="70" rx="3" fill="#818CF8"/>

  <!-- Sparkle/insight indicators (gold accents) -->
  <circle cx="335" cy="272" r="4.5" fill="#FBBF24"/>
  <circle cx="378" cy="268" r="3.5" fill="#F59E0B"/>
  <circle cx="352" cy="282" r="3" fill="#FCD34D"/>

  <!-- Subtle glow behind magnifying glass -->
  <circle cx="355" cy="310" r="80" fill="none" stroke="#6366F1" stroke-width="1.5" opacity="0.2"/>
</svg>
