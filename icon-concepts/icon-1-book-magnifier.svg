<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 1: Open book with magnifying glass revealing data/insights -->
  <defs>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748"/>
      <stop offset="100%" style="stop-color:#1A202C"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7FAFC"/>
      <stop offset="100%" style="stop-color:#EDF2F7"/>
    </linearGradient>
  </defs>

  <!-- Book base -->
  <path d="M80 120 C80 100, 100 80, 120 80 L256 80 L256 400 L120 400 C100 400, 80 380, 80 360 Z" fill="url(#pageGrad)" stroke="#CBD5E0" stroke-width="3"/>
  <path d="M256 80 L392 80 C412 80, 432 100, 432 120 L432 360 C432 380, 412 400, 392 400 L256 400 Z" fill="url(#pageGrad)" stroke="#CBD5E0" stroke-width="3"/>

  <!-- Book spine -->
  <rect x="248" y="76" width="16" height="328" rx="4" fill="url(#bookGrad)"/>

  <!-- Text lines on left page -->
  <rect x="110" y="140" width="120" height="6" rx="3" fill="#A0AEC0"/>
  <rect x="110" y="160" width="100" height="6" rx="3" fill="#A0AEC0"/>
  <rect x="110" y="180" width="115" height="6" rx="3" fill="#A0AEC0"/>
  <rect x="110" y="200" width="90" height="6" rx="3" fill="#A0AEC0"/>
  <rect x="110" y="220" width="110" height="6" rx="3" fill="#A0AEC0"/>
  <rect x="110" y="260" width="120" height="6" rx="3" fill="#A0AEC0"/>
  <rect x="110" y="280" width="95" height="6" rx="3" fill="#A0AEC0"/>
  <rect x="110" y="300" width="108" height="6" rx="3" fill="#A0AEC0"/>

  <!-- Magnifying glass -->
  <circle cx="360" cy="320" r="70" fill="none" stroke="url(#lensGrad)" stroke-width="12"/>
  <line x1="410" y1="370" x2="450" y2="410" stroke="url(#lensGrad)" stroke-width="14" stroke-linecap="round"/>

  <!-- Data visualization inside lens -->
  <rect x="325" y="330" width="12" height="35" rx="3" fill="#6366F1" opacity="0.8"/>
  <rect x="342" y="310" width="12" height="55" rx="3" fill="#8B5CF6" opacity="0.8"/>
  <rect x="359" y="320" width="12" height="45" rx="3" fill="#A78BFA" opacity="0.8"/>
  <rect x="376" y="300" width="12" height="65" rx="3" fill="#6366F1" opacity="0.8"/>

  <!-- Sparkle/insight indicator -->
  <circle cx="340" cy="280" r="4" fill="#F59E0B"/>
  <circle cx="380" cy="275" r="3" fill="#F59E0B"/>
  <circle cx="355" cy="290" r="2.5" fill="#FBBF24"/>
</svg>
